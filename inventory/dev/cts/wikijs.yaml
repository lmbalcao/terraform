version: 1
kind: ct
enabled: true
vmid: 6011
name: wikijs
hostname: wikijs
node: dev-proxmox
tags:
  - 60-servicos-externos
network:
  segment: vlan-99
  mode: dhcp
resources:
  cpu_cores: 1
  memory_mb: 1024
  swap_mb: 1024
boot:
  on_boot: true
  start: true
storage:
  rootfs_storage: local-lvm
  rootfs_size_gb: 8
lxc:
  template: local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst
  unprivileged: true
  features:
    nesting: true
  mounts: []
services:
  - name: wikijs
    scheme: http
    port: 80
    traefik_tag: traefik-dev
    traefik_label: wikijs
    uri: wikijs.lbtec.org
operations:
  ansible_enabled: false
  backup_policy: null
  bootstrap_profile: null
