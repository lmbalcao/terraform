version: 1
kind: ct
enabled: true
vmid: null
name: nextcloud
hostname: nextcloud
node: n100
tags:
  - 99-terra-dev
network:
  segment: vlan-99
  mode: dhcp
resources:
  cpu_cores: 4
  memory_mb: 4096
  swap_mb: 2048
boot:
  on_boot: true
  start: true
storage:
  rootfs_storage: ceph-rbd
  rootfs_size_gb: 16
lxc:
  template: local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst
  unprivileged: true
  features:
    nesting: true
  mounts:
    - slot: 0
      mp: /mnt/data
      storage: /mnt/pve/nas1/data/dev/nextcloud
services:
  - name: nextcloud
    scheme: http
    port: 80
    traefik_tag: traefik-ext
    traefik_label: nextcloud
    uri: nextcloud.lbtec.org
operations:
  ansible_enabled: false
  backup_policy: null
  bootstrap_profile: null
