version: 1
kind: ct
enabled: true
vmid: null
name: zerotrust-master
hostname: zerotrust-master
node: 4core
tags:
  - 99-terra-dev
network:
  segment: vlan-50
  mode: static
  address: 192.168.50.122/24
  gateway: 192.168.50.1
resources:
  cpu_cores: 1
  memory_mb: 512
  swap_mb: 512
boot:
  on_boot: true
  start: true
storage:
  rootfs_storage: ceph-rbd
  rootfs_size_gb: 2
lxc:
  template: local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst
  unprivileged: true
  features:
    nesting: true
  mounts:
    - slot: 0
      mp: /mnt/data
      storage: /mnt/pve/nas1/data/dev/zerotrust-master
services: []
operations:
  ansible_enabled: false
  backup_policy: null
  bootstrap_profile: null
