version: 1
kind: ct
enabled: true
vmid: null
name: honeypot
hostname: honeypot
node: 2core
tags:
  - 99-terra-dev
network:
  segment: vlan-99
  mode: static
  address: 192.168.99.21/24
  gateway: 192.168.99.1
resources:
  cpu_cores: 1
  memory_mb: 1024
  swap_mb: 1024
boot:
  on_boot: true
  start: true
storage:
  rootfs_storage: ceph-rdb
  rootfs_size_gb: 8
lxc:
  template: local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst
  unprivileged: true
  features:
    nesting: true
  mounts:
    - slot: 0
      mp: /mnt/data
      storage: /mnt/pve/nas1/data/dev/honeypot
services: []
operations:
  ansible_enabled: false
  backup_policy: null
  bootstrap_profile: null
