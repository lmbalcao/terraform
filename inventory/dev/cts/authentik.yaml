version: 1
kind: ct
enabled: true
vmid: null
name: authentik
hostname: authentik
node: 4core
tags:
  - 99-terra-dev
network:
  segment: vlan-99
  mode: dhcp
resources:
  cpu_cores: 4
  memory_mb: 4096
  swap_mb: 2048
boot:
  on_boot: true
  start: true
storage:
  rootfs_storage: ceph-rdb
  rootfs_size_gb: 12
lxc:
  template: local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst
  unprivileged: true
  features:
    nesting: true
  mounts:
    - slot: 0
      mp: /mnt/data
      storage: /mnt/pve/nas1/data/dev/authentik
services:
  - name: authentik
    scheme: http
    port: 80
    traefik_tag: traefik-int
    traefik_label: authentik
    uri: authentik.lbtec.org
operations:
  ansible_enabled: false
  backup_policy: null
  bootstrap_profile: null
