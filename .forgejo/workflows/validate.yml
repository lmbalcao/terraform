name: Validate Repository

"on":
  push:
    branches: [main, master]
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository baseline
        run: bash scripts/validate-repo.sh

  inventory:
    runs-on: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML inventory
        run: bash scripts/validate-inventory.sh

  terraform-config:
    runs-on: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting for active stacks
        run: |
          terraform fmt -check -recursive modules
          terraform fmt -check -recursive stacks

      - name: Validate proxmox-base stack
        run: |
          terraform -chdir=stacks/proxmox-base init -backend=false
          terraform -chdir=stacks/proxmox-base validate

      - name: Validate openwrt-dns stack
        run: |
          terraform -chdir=stacks/openwrt-dns init -backend=false
          terraform -chdir=stacks/openwrt-dns validate
